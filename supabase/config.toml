project_id = "intranet"

[db]
major_version = 17

[functions.notify-tax-models]
verify_jwt = false

[functions.notify-tax-submission]
verify_jwt = false

[functions.notify-enisa-welcome]
verify_jwt = false

[functions.notify-enisa-submission]
verify_jwt = false

# Cron diario invocado por pg_net (sin JWT). Valida x-webhook-secret en código.
[functions.notify-documentation-supervisors-daily]
verify_jwt = false

# Invocada desde server action con admin client. Mismo patrón que
# notify-tax-submission: sin verify_jwt — la URL no se expone al frontend.
[functions.notify-documentation-client-reminder]
verify_jwt = false

# Invocada desde el server action bulkAssign del flujo "Asignación múltiple".
# Recibe template_slug y resuelve la plantilla por slug.
[functions.notify-documentation-template-email]
verify_jwt = false

# Invocada desde el server action finalizeOnboarding al finalizar el alta de
# un nuevo cliente (envía un único email a las cuentas asociadas con CC a
# supervisores y chiefs).
[functions.notify-client-onboarding-welcome]
verify_jwt = false

# Invocada desde el server action notifyClientDashboardReady cuando se
# activa el dashboard fiscal de una empresa (botón de único uso en el panel
# admin tras configurar el Google Sheet).
[functions.notify-client-dashboard-ready]
verify_jwt = false

# Invocada desde el server action sendRentaInvitationEmail cuando el asesor
# pulsa "Enviar formulario" en el panel de Declaración de la renta del cliente.
[functions.notify-renta-invitation]
verify_jwt = false
